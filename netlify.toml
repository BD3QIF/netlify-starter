[functions]
  directory = "netlify/functions/"
  
[[redirects]]
  from = "/comment/*"
  to = "/.netlify/functions/comment/:splat"
  status = 200
  force = false

[[headers]]
  for = "/comment/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
